<!-- section-statistic -->
<div class="section-statistic">
    <div class="line"></div>
    <div class="container">
        <div class="row justify-content-between">
            <div class="col-md-6">
                <div class="heading-section mb-48">
                    <div class="heading-sub fw-semibold style-1 effectFade fadeUp">By the Numbers</div>
                    <div class="heading-title text-white effectFade fadeRotateX">Building products <br> that work</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="statistic-slider">
                    <div class="text text-body-1 text-neutral-400 effectFade fadeUp">
                        Their AI receptionist cut our missed calls to almost zero. Setup was done in 10 days.
                    </div>
                    <div class="swiper swiper-progressbar">
                        <div class="group-slider effectFade fadeUp">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressBar"></div>
                            </div>
                            <div class="group-btn-slider">
                                <div class="btn-slider progressbar-prev">
                                    <i class="icon icon-angle-left-solid"></i>
                                </div>
                                <div class="btn-slider progressbar-next">
                                    <i class="icon icon-angle-right-solid"></i>
                                </div>
                            </div>
                        </div>
                        <div class="swiper-wrapper effectFade fadeUp">
                            <div class="swiper-slide">
                                <div class="title fw-semibold text-body-1">PROJECTS DELIVERED</div>
                                <div class="statistic-number">
                                    <span class="number text-white fw-semibold">50</span>
                                    <span class="prefix text-brand">+</span>
                                </div>
                            </div>
                            <div class="swiper-slide">
                                <div class="title fw-semibold text-body-1">CLIENT RETENTION</div>
                                <div class="statistic-number">
                                    <span class="number text-white fw-semibold">95</span>
                                    <span class="prefix text-brand">%</span>
                                </div>
                            </div>
                            <div class="swiper-slide">
                                <div class="title fw-semibold text-body-1">MVP DELIVERY</div>
                                <div class="statistic-number">
                                    <span class="number text-white fw-semibold">2</span>
                                    <span class="prefix text-brand"> Weeks</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- /section-statistic -->
